name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  create-release-tag:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create next release tag
        run: |
          git fetch --tags --force

          if git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Current commit already has a release tag; skipping tag creation."
            exit 0
          fi

          package_version=$(node -p "require('./package.json').version")
          next_version=$(node scripts/release-version.mjs "$package_version" $(git tag --list 'v*'))
          next_tag="v$next_version"

          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "Tag $next_tag already exists."
            exit 0
          fi

          git tag -a "$next_tag" -m "Release $next_tag"
          git push origin "$next_tag"

  linux-appimage:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Align package version with release ref
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version=$(node -p "require('./package.json').version")
          fi

          npm version "$release_version" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        run: xvfb-run -a npm run smoke:test

      - name: Build AppImage
        run: npm run dist

      - name: Generate checksums
        run: sha256sum dist/*.AppImage > dist/SHASUMS256.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vessel-linux-appimage
          path: |
            dist/*.AppImage
            dist/SHASUMS256.txt

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/SHASUMS256.txt
